name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run go fmt
        run: |
          go fmt ./...

      - name: Run go build
        run: |
          go build ./...

      - name: Run go test
        run: |
          go test ./...
