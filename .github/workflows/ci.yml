name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clean generated files
        run: make clean

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install ANTLR4
        run: |
          curl -fsSL -o /tmp/antlr4.jar \
            https://www.antlr.org/download/antlr-4.13.1-complete.jar
          printf '#!/bin/sh\nexec java -jar /tmp/antlr4.jar "$@"\n' \
            | sudo tee /usr/local/bin/antlr4 > /dev/null
          sudo chmod +x /usr/local/bin/antlr4

      - name: Generate parser/lexer
        run: make generate

      - name: Run go fmt
        run: |
          go fmt ./...

      - name: Run go build
        run: |
          go build ./...

      - name: Run go test
        run: |
          make test

      - name: Build release binaries
        run: |
          for target in linux/amd64 windows/amd64; do
            make build OS=${target%/*} ARCH=${target#*/}
          done

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/linux_amd64/sqlfmt \
            dist/windows_amd64/sqlfmt.exe \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
