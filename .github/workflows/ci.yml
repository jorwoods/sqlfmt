name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clean generated files
        run: make clean

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install ANTLR4
        run: |
          curl -fsSL -o /tmp/antlr4.jar \
            https://www.antlr.org/download/antlr-4.13.1-complete.jar
          printf '#!/bin/sh\nexec java -jar /tmp/antlr4.jar "$@"\n' \
            | sudo tee /usr/local/bin/antlr4 > /dev/null
          sudo chmod +x /usr/local/bin/antlr4

      - name: Generate parser/lexer
        run: make generate

      - name: Run go fmt
        run: |
          go fmt ./...

      - name: Run go build
        run: |
          go build ./...

      - name: Run go test
        run: |
          make test

      - name: Build release binaries
        run: |
          for target in linux/amd64 windows/amd64; do
            make build OS=${target%/*} ARCH=${target#*/}
          done

      - name: Upload release artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: sqlfmt-binaries
          path: dist/
